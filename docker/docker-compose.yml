version: '3.8'

networks:
  app-network:
    driver: bridge

volumes:
  mysql-data:

services:

  web:
    image: nginx:latest
    container_name: mon-app_web_1
    ports:
      - "80:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - app-network
    restart: always

  frontend:
    build: ./frontend
    container_name: mon-app_frontend_1
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://192.168.56.103:5000
    networks:
      - app-network
    restart: always

  backend:
    build: ./backend
    container_name: mon-app_backend_1
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=bigdata_db
    depends_on:
      - db
    networks:
      - app-network
    restart: always

  db:
    image: mysql:8.0
    container_name: mon-app_db_1
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=bigdata_db
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network
    restart: always

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: mon-app_phpmyadmin_1
    ports:
      - "8080:80"
    environment:
      - PMA_HOST=db
      - PMA_USER=root
      - PMA_PASSWORD=rootpassword
    depends_on:
      - db
    networks:
      - app-network
    restart: always
